<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error de activación - Arynstal</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            padding: 40px;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #dc2626; font-size: 24px; margin: 0 0 16px; }
        p { color: #666; line-height: 1.6; margin: 0 0 24px; }
        .btn {
            display: inline-block;
            background: #0E4D92;
            color: #fff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>{% if error == 'expired' %}Enlace expirado{% else %}Enlace no válido{% endif %}</h1>
        <p>{{ message }}</p>
        {% if resend_url %}
            <a href="{{ resend_url }}" class="btn" style="margin-bottom: 12px;">Solicitar nueva activación</a>
            <br>
        {% endif %}
        <a href="/" class="btn" {% if resend_url %}style="background: #6b7280;"{% endif %}>Ir al inicio</a>
    </div>
</body>
</html>
